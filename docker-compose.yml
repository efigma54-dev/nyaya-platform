services:
  postgres:
    image: postgres:16-alpine
    container_name: nyaya_postgres
    environment:
      POSTGRES_USER: nyaya_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: nyaya_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyaya_user -d nyaya_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: nyaya_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: nyaya_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: nyaya_api
    init: true
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://nyaya_user:${POSTGRES_PASSWORD}@postgres:5432/nyaya_db
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache
      - ./scripts:/scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nyaya_frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=
    ports:
      - "3005:3000"
    # depends_on:
    #   - api

volumes:
  postgres_data:
  qdrant_data:
  hf_cache:
